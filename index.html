<style>
:root{--bg:#f3f8f3;--card:#fff;--p:#2d6a4f;--p2:#40916c;--s:#52b788;--a:#95d5b2;--l:#d8f3dc;--vl:#eaf6ea;--dk:#1b4332;--tx:#263427;--tm:#5a7a60;--br:#b7e4c7;--bl:#dff0e0}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--dk);font-family:'Noto Sans TC',-apple-system,sans-serif;color:var(--tx)}
#app{min-height:100vh;background:var(--bg)}
.hdr{background:linear-gradient(135deg,var(--dk),var(--p));padding:max(18px,env(safe-area-inset-top,0px)) 20px 18px;text-align:center}
.hdr h1{font-size:20px;font-weight:800;color:#fff;letter-spacing:.1em}
.hdr p{font-size:12px;color:var(--a);margin-top:3px}
.tabs{display:flex;background:var(--card);border-bottom:2px solid var(--bl);position:sticky;top:0;z-index:10}
.tab{flex:1;padding:9px 4px;text-align:center;cursor:pointer;background:none;border:none;border-bottom:3px solid transparent;color:var(--tm);transition:all .2s}
.tab.on{color:var(--p);border-bottom-color:var(--p)}
.tab .ti{font-size:18px}
.tab .tl{font-size:10px;margin-top:1px}
.tab.on .tl{font-weight:700}
.content{padding:14px 14px 56px;max-width:480px;margin:0 auto}
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(45,106,79,.08);border:1px solid var(--bl)}
.sec{font-size:14px;font-weight:700;color:var(--dk);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tag{background:#eee;color:#555;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-block}
.inp{width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid var(--br);font-size:13px;outline:none;background:var(--vl);color:var(--tx)}
.inp:focus{border-color:var(--p)}
select.inp{cursor:pointer}
.btn{border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--p);color:#fff}
.btn-o{background:transparent;color:var(--p);border:1.5px solid var(--p)}
.btn-l{background:var(--l);color:var(--p)}
.pbar-wrap{background:var(--bl);border-radius:4px;height:8px;overflow:hidden}
.pbar{height:100%;border-radius:4px;transition:width .4s ease}
.day-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-btn{padding:5px 10px;border-radius:20px;font-size:11px;white-space:nowrap;border:none;cursor:pointer;flex-shrink:0;background:var(--vl);color:var(--tm)}
.day-btn.on{background:var(--p);color:#fff;font-weight:700}
.act-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bl);align-items:flex-start}
.act-time{font-size:11px;color:var(--tm);min-width:42px;padding-top:3px;flex-shrink:0}
.act-icon{font-size:20px;flex-shrink:0}
.act-body{flex:1;min-width:0}
.act-name{font-weight:600;font-size:13px}
.act-note{font-size:11px;color:var(--tm);margin-top:2px;line-height:1.4}
.act-btns{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;padding:3px 4px;font-size:14px;line-height:1}
.map-btn{background:#e8f0fe;border:none;color:#1a73e8;border-radius:6px;font-size:13px;cursor:pointer;padding:3px 6px}
.form-box{margin-top:12px;padding:12px;background:var(--vl);border-radius:10px}
.form-label{font-size:11px;color:var(--tm);margin-bottom:3px}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row{margin-bottom:8px}
.form-actions{display:flex;gap:8px;margin-top:10px}
.overview-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bl);cursor:pointer}
.spot-card{display:flex;gap:12px}
.spot-icon{font-size:30px;min-width:38px;text-align:center;padding-top:2px}
.spot-body{flex:1}
.spot-name{font-weight:700;font-size:14px}
.spot-desc{font-size:12px;color:var(--tm);margin:5px 0 10px;line-height:1.5}
.spot-btns{display:flex;gap:7px;flex-wrap:wrap}
.gmaps-btn{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#e8f0fe;color:#1a73e8;border:none}
.city-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.city-pills::-webkit-scrollbar{display:none}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;white-space:nowrap;border:none;cursor:pointer;flex-shrink:0;background:var(--vl);color:var(--tm)}
.pill.on{background:var(--p);color:#fff;font-weight:700}
.exp-row{padding:10px 0;border-bottom:1px solid var(--bl)}
.exp-inner{display:flex;align-items:flex-start;gap:8px}
.exp-photo{width:44px;height:44px;object-fit:cover;border-radius:8px;border:1.5px solid var(--br);cursor:pointer;flex-shrink:0}
.exp-body{flex:1;min-width:0}
.exp-name{font-weight:600;font-size:13px}
.exp-amt{font-weight:800;font-size:14px;color:var(--dk)}
.exp-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.pay-btns{display:flex;gap:7px;margin-top:6px}
.pay-btn{flex:1;padding:8px 4px;border-radius:10px;border:2px solid var(--bl);background:#fff;cursor:pointer;text-align:center;transition:all .15s}
.pay-btn.on{border-color:var(--c,var(--p))}
.pay-btn .pi{font-size:20px}
.pay-btn .pl{font-size:11px;font-weight:700;margin-top:2px;color:var(--tm)}
.pay-btn.on .pl{color:var(--c,var(--p))}
.member-btns{display:flex;gap:8px;margin-top:6px}
.member-btn{flex:1;padding:8px;border-radius:10px;border:2px solid var(--bl);background:#fff;cursor:pointer;text-align:center}
.member-btn.on{border-color:var(--mc)}
.split-ctrl{display:flex;align-items:center;gap:8px;margin-top:6px}
.split-num{display:flex;border-radius:8px;overflow:hidden;border:1.5px solid var(--br)}
.split-num button{padding:6px 12px;border:none;background:#fff;cursor:pointer;font-size:16px;color:var(--p);font-weight:700}
.split-num span{padding:6px 14px;font-size:13px;font-weight:700;background:var(--vl)}
.rate-bar{display:flex;justify-content:space-between;align-items:center}
.rate-val{font-size:13px;color:var(--p);font-weight:600}
.settle-box{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-top:4px}
.member-card{padding:12px;border-radius:10px;text-align:center}
.pack-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bl)}
.pack-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:var(--p)}
.pack-label{flex:1;font-size:13px}
.pack-label.done{text-decoration:line-through;color:var(--tm)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:300px}
input[type=file]{display:none}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;cursor:pointer}
.lightbox img{max-width:100%;max-height:90vh;border-radius:12px}
.lbclose{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;cursor:pointer}
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#1b4332,#2d6a4f);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#splash.out{opacity:0;pointer-events:none}
.si{font-size:68px;margin-bottom:18px;animation:pulse 1.5s ease-in-out infinite}
.st{color:#fff;font-size:21px;font-weight:700;letter-spacing:.12em;margin-bottom:5px}
.ss{color:rgba(149,213,178,.8);font-size:12px;margin-bottom:26px}
.sl{display:flex;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(149,213,178,.7);animation:bounce 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
</style>

function tag(text,color,bg){return '<span class="tag" style="color:'+color+';background:'+bg+'">'+esc(text)+'</span>'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function pbar(pct,color){return '<div class="pbar-wrap"><div class="pbar" style="width:'+Math.min(pct,100)+'%;background:'+color+'"></div></div>'}
function toTWD(a,c){return c==='JPY'?Math.round(Number(a)*S.rate):Number(a)}

}

function renderApp(){
  return '<div class="hdr"><h1>🗾 北海道旅遊規劃</h1><p>Sapporo &amp; Biei · May 31–Jun 05, 2026 · with Stanley</p></div>'+
  '<div class="tabs">'+
    ['itinerary','spots','budget','packing'].map(function(id,i){
      var icons=['📅','🗺️','💴','🎒'],labels=['行程規劃','景點推薦','記帳','打包清單'];
      return '<button class="tab'+(S.tab===id?' on':'')+'" data-tab="'+id+'"><div class="ti">'+icons[i]+'</div><div class="tl">'+labels[i]+'</div></button>';
    }).join('')+
  '</div>'+
  '<div class="content">'+renderTab()+'</div>'+
  (S.spotModal?renderSpotModal():'')+
  (S.viewPhoto?'<div class="lightbox" id="lightbox"><img src="'+S.viewPhoto+'"><button class="lbclose">×</button></div>':'');
}

function renderTab(){
  if(S.tab==='itinerary') return renderItinerary();
  if(S.tab==='spots') return renderSpots();
  if(S.tab==='budget') return renderBudget();
  return renderPacking();
}

function renderItinerary(){
  var d=S.days[S.selDay];
  var html='<div class="day-tabs">';
  S.days.forEach(function(day,i){
    html+='<button class="day-btn'+(S.selDay===i?' on':'')+'" data-selday="'+i+'">'+DL[i]+(day.city?'・'+day.city:'')+'</button>';
  });
  html+='</div><div class="card">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px">';
  html+='<span style="font-weight:700;font-size:15px;color:var(--p);flex-shrink:0">Day '+(S.selDay+1)+'・'+DL[S.selDay]+'</span>';
  html+='<div style="display:flex;gap:6px;align-items:center">';
  html+='<input class="inp" id="cityInp" value="'+esc(d.city)+'" placeholder="城市" style="width:86px;padding:5px 8px;font-size:12px">';
  html+='<button class="btn" style="background:#e8f0fe;color:#1a73e8;font-size:12px;flex-shrink:0;padding:5px 9px" id="routeBtn">📍路線</button>';
  html+='</div></div>';

  if(!d.acts.length) html+='<div style="text-align:center;color:var(--tm);padding:18px 0;font-size:13px">尚無行程，點擊下方新增 ✨</div>';
  d.acts.forEach(function(act){
    var t=AT[act.type]||AT.sight;
    html+='<div class="act-row">';
    html+='<span class="act-time">'+esc(act.time)+'</span>';
    html+='<span class="act-icon">'+t.i+'</span>';
    html+='<div class="act-body"><div class="act-name">'+esc(act.name)+'</div>';
    if(act.note) html+='<div class="act-note">'+esc(act.note)+'</div>';
    html+=tag(t.l,t.c,t.bg)+'</div>';
    html+='<div class="act-btns">';
    html+='<button class="map-btn" data-actmap="'+esc(act.name)+'">📍</button>';
    html+='<button class="icon-btn" data-editact="'+act.id+'" style="color:var(--s)">✏️</button>';
    html+='<button class="icon-btn" data-delact="'+act.id+'" style="color:#ccc;font-size:16px">×</button>';
    html+='</div></div>';
  });

  if(S.showAdd){
    var f=S.actForm;
    html+='<div class="form-box"><div style="font-weight:700;font-size:13px;color:var(--p);margin-bottom:10px">'+(S.editActId?'✏️ 編輯行程':'+ 新增行程')+'</div>';
    html+='<div class="form-grid2"><div><div class="form-label">時間</div><input type="time" class="inp" id="actTime" value="'+f.time+'"></div>';
    html+='<div><div class="form-label">類型</div><select class="inp" id="actType">';
    Object.keys(AT).forEach(function(k){html+='<option value="'+k+'"'+(f.type===k?' selected':'')+'>'+AT[k].i+' '+AT[k].l+'</option>';});
    html+='</select></div></div>';
    html+='<div class="form-row"><div class="form-label">行程名稱 *</div><input class="inp" id="actName" value="'+esc(f.name)+'" placeholder="例：小樽運河攝影"></div>';
    html+='<div class="form-row"><div class="form-label">備註</div><input class="inp" id="actNote" value="'+esc(f.note)+'" placeholder="提醒、票券⋯"></div>';
    html+='<div class="form-actions"><button class="btn btn-p" id="actSubmit" style="flex:1">'+(S.editActId?'儲存修改':'✓ 新增')+'</button><button class="btn btn-o" id="actCancel" style="flex:1">取消</button></div></div>';
  } else {
    html+='<button class="btn btn-l" id="addActBtn" style="width:100%;margin-top:12px">+ 新增行程</button>';
  }

  html+='<button class="btn" id="toggleMap" style="width:100%;margin-top:10px;background:'+(S.showMap?'var(--vl)':'#fff')+';color:var(--p);border:1.5px solid var(--bl)">';
  html+=(S.showMap?'▲ 隱藏地圖':'🗺️ 今日行程地圖預覽')+'</button>';
  html+='<div id="daymap"'+(S.showMap?'':' style="display:none"')+'></div>';
  html+='</div>';

  html+='<div class="card">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  html+='<div class="sec" style="margin-bottom:0">📋 六日總覽</div>';
  html+='<button class="btn" id="resetBtn" style="font-size:11px;padding:4px 10px;background:#fee2e2;color:#dc2626;border:none">🔄 重置行程</button>';
  html+='</div>';
  S.days.forEach(function(day,i){
    html+='<div class="overview-row" data-selday="'+i+'">';
    html+=tag(DL[i],i===S.selDay?'var(--p)':'#666',i===S.selDay?'var(--l)':'#f5f5f5');
    html+='<span style="font-size:12px;color:var(--tm);flex:1;margin-left:4px">'+esc(day.city||'未設定城市')+'</span>';
    html+='<span style="font-size:12px;font-weight:700;color:var(--p)">'+day.acts.length+' 項</span></div>';
  });
  html+='</div>';
  return html;
}

function renderSpots(){
  var cities=['全部'];
  var seen={};
  SPOTS.forEach(function(s){if(!seen[s.city]){cities.push(s.city);seen[s.city]=1;}});
  var filtered=SPOTS.filter(function(s){
    return (S.spotCity==='全部'||s.city===S.spotCity)&&(!S.spotQ||s.name.includes(S.spotQ)||s.desc.includes(S.spotQ));
  });
  var html='<input class="inp" id="spotQ" value="'+esc(S.spotQ)+'" placeholder="🔍 搜尋景點" style="margin-bottom:10px">';
  html+='<div class="city-pills">';
  cities.forEach(function(c){html+='<button class="pill'+(S.spotCity===c?' on':'')+'" data-city="'+esc(c)+'">'+esc(c)+'</button>';});
  html+='</div>';
  filtered.forEach(function(spot){
    html+='<div class="card"><div class="spot-card">';
    html+='<div class="spot-icon">'+spot.icon+'</div><div class="spot-body">';
    html+='<div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:4px">';
    html+='<span class="spot-name">'+esc(spot.name)+'</span>'+tag(spot.city,'var(--p)','var(--l)')+tag(spot.cat,'#666','#f0f0f0');
    html+='</div><div class="spot-desc">'+esc(spot.desc)+'</div>';
    html+='<div class="spot-btns">';
    html+='<button class="gmaps-btn" data-gmaps="'+esc(spot.name+' '+spot.city+' Japan')+'">📍 Google 導航</button>';
    if(S.added.has(spot.id)) html+=tag('✓ 已加入行程','var(--s)','var(--l)');
    else html+='<button class="btn btn-o" style="font-size:12px;padding:5px 12px" data-addspot="'+spot.id+'">+ 加入行程</button>';
    html+='</div></div></div></div>';
  });
  return html;
}

function renderBudget(){
  var tot=S.exps.reduce(function(s,e){return s+toTWD(e.amount,e.cur);},0);
  var wPaid=S.exps.reduce(function(s,e){return e.paidBy==='Wendy'?s+toTWD(e.amount,e.cur):s;},0);
  var sPaid=S.exps.reduce(function(s,e){return e.paidBy==='Stanley'?s+toTWD(e.amount,e.cur):s;},0);
  var net=wPaid-sPaid;
  var html='';

  // Rate
  html+='<div class="card" style="padding:12px 14px">';
  html+='<div class="rate-bar"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:700;color:var(--dk)">💱 匯率</span>';
  html+='<span class="rate-val">1 JPY = <b>'+S.rate.toFixed(4)+'</b> TWD</span></div>';
  html+='<div style="display:flex;gap:6px"><button class="btn" id="fetchRate" style="font-size:11px;padding:4px 10px;background:var(--vl);color:var(--p);border:1px solid var(--br)">🔄 即時匯率</button>';
  html+='<button class="btn" id="toggleRate" style="font-size:11px;padding:4px 8px;background:var(--vl);color:var(--tm);border:1px solid var(--br)">✏️</button></div></div>';
  if(S.showRate) html+='<div style="display:flex;align-items:center;gap:8px;margin-top:10px"><span style="font-size:12px;color:var(--tm);flex-shrink:0">手動設定：</span><input type="number" step=".001" class="inp" id="rateInp" value="'+S.rate+'" style="width:100px;padding:5px 8px"><span style="font-size:12px;color:var(--tm)">TWD/JPY</span></div>';
  html+='</div>';

  // Budget overview
  html+='<div class="card"><div class="sec">💴 預算總覽</div>';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">';
  html+='<div><div class="form-label">總預算（TWD）</div><input type="number" class="inp" id="budgetInp" value="'+S.budget+'" style="width:140px;padding:5px 8px"></div>';
  html+='<div style="text-align:right"><div class="form-label">已花費 TWD</div><div style="font-size:22px;font-weight:800;color:'+(tot/S.budget>.9?'#e63946':'var(--p)')+'">'+tot.toLocaleString()+'</div></div></div>';
  html+=pbar((tot/S.budget)*100, tot/S.budget>.9?'#e63946':'var(--s)');
  html+='<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tm);margin-top:5px">';
  html+='<span>已用 '+(S.budget>0?((tot/S.budget)*100).toFixed(1):0)+'%</span><span>剩餘 '+(S.budget-tot).toLocaleString()+' TWD</span></div></div>';

  // Split summary
  if(tot>0){
    html+='<div class="card"><div class="sec">👥 拆帳結算</div>';
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">';
    [{name:'Wendy',paid:wPaid,emoji:'👩',c:'#e76f51',bg:'#fde8e2'},{name:'Stanley',paid:sPaid,emoji:'👨',c:'#4361ee',bg:'#e0e7ff'}].forEach(function(m){
      var diff=m.paid-tot/2;
      html+='<div class="member-card" style="background:'+m.bg+'"><div style="font-size:20px">'+m.emoji+'</div>';
      html+='<div style="font-weight:700;color:'+m.c+';font-size:14px;margin-top:4px">'+m.name+'</div>';
      html+='<div style="font-size:16px;font-weight:800;color:var(--dk);margin-top:2px">'+m.paid.toLocaleString()+' <span style="font-size:10px;font-weight:400">TWD</span></div>';
      html+='<div style="font-size:11px;margin-top:3px;font-weight:600;color:'+(diff>0?'#16a34a':'#dc2626')+'">'+(diff>0?'+'+Math.round(diff).toLocaleString()+' 多付':diff<0?'應補 '+Math.abs(Math.round(diff)).toLocaleString():'已平衡')+'</div></div>';
    });
    html+='</div>';
    if(Math.abs(net)>0){
      html+='<div class="settle-box" style="background:'+(net>0?'#f0fdf4':'#fef2f2')+';border:1.5px solid '+(net>0?'#bbf7d0':'#fecaca')+';color:'+(net>0?'#16a34a':'#dc2626')+'">';
      html+=(net>0?'💸 Stanley 需補給 Wendy '+Math.round(net/2).toLocaleString()+' TWD':'💸 Wendy 需補給 Stanley '+Math.round(Math.abs(net)/2).toLocaleString()+' TWD');
      html+='<div style="font-size:10px;font-weight:400;margin-top:3px;color:var(--tm)">各自應付 '+Math.round(tot/2).toLocaleString()+' TWD（總花費 '+tot.toLocaleString()+' ÷ 2）</div></div>';
    }
    html+='</div>';

    // Pay method
    var byPay=PAYS.map(function(m){return Object.assign({},m,{amt:S.exps.filter(function(e){return e.pay===m.id;}).reduce(function(s,e){return s+toTWD(e.amount,e.cur);},0)});}).filter(function(m){return m.amt>0;});
    if(byPay.length){
      html+='<div class="card"><div class="sec">💳 付款方式</div><div style="display:flex;gap:8px">';
      byPay.forEach(function(m){html+='<div style="flex:1;text-align:center;padding:10px 6px;background:'+m.bg+';border-radius:10px"><div style="font-size:20px">'+m.icon+'</div><div style="font-size:11px;font-weight:700;color:'+m.c+';margin-top:2px">'+m.id+'</div><div style="font-size:12px;font-weight:800;color:var(--dk);margin-top:2px">'+m.amt.toLocaleString()+'</div><div style="font-size:10px;color:var(--tm)">TWD</div></div>';});
      html+='</div></div>';
    }

    // Category
    var byCat=ECATS.map(function(c){return {c:c,amt:S.exps.filter(function(e){return e.cat===c;}).reduce(function(s,e){return s+toTWD(e.amount,e.cur);},0)};}).filter(function(x){return x.amt>0;});
    if(byCat.length){
      html+='<div class="card"><div class="sec">📊 分類統計</div>';
      byCat.forEach(function(x){
        html+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px">'+tag(x.c,ECOL[x.c],ECOL[x.c]+'22')+'<span style="font-size:12px;font-weight:700">'+x.amt.toLocaleString()+' TWD</span></div>'+pbar((x.amt/S.budget)*100,ECOL[x.c])+'</div>';
      });
      html+='</div>';
    }
  }

  // Expense list
  html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html+='<div class="sec" style="margin-bottom:0">🧾 支出明細</div><button class="btn btn-p" id="toggleAddExp">+ 記帳</button></div>';
  if(S.showAddExp){
    var f=S.expForm;
    html+='<div class="form-box" style="margin-bottom:14px">';
    html+='<div class="form-grid2"><div><div class="form-label">名稱 *</div><input class="inp" id="expName" value="'+esc(f.name)+'" placeholder="例：三角市場海鮮丼"></div>';
    html+='<div><div class="form-label">類別</div><select class="inp" id="expCat">'+ECATS.map(function(c){return '<option'+(f.cat===c?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div></div>';
    html+='<div class="form-row"><div class="form-label">金額 *</div><div style="display:flex;gap:8px">';
    html+='<input type="number" class="inp" id="expAmt" value="'+f.amount+'" placeholder="0" style="flex:1">';
    html+='<div style="display:flex;border-radius:8px;overflow:hidden;border:1.5px solid var(--br);flex-shrink:0">';
    html+='<button class="btn" id="curJPY" style="padding:6px 10px;border-radius:0;background:'+(f.cur==='JPY'?'var(--p)':'#fff')+';color:'+(f.cur==='JPY'?'#fff':'var(--tm)')+'">JPY</button>';
    html+='<button class="btn" id="curTWD" style="padding:6px 10px;border-radius:0;background:'+(f.cur==='TWD'?'var(--p)':'#fff')+';color:'+(f.cur==='TWD'?'#fff':'var(--tm)')+'">TWD</button></div></div>';
    if(f.cur==='JPY'&&Number(f.amount)>0) html+='<div style="font-size:11px;color:var(--tm);margin-top:4px">≈ <b style="color:var(--p)">'+Math.round(f.amount*S.rate).toLocaleString()+' TWD</b></div>';
    html+='</div>';
    html+='<div class="form-row"><div class="form-label">付款方式</div><div class="pay-btns">';
    PAYS.forEach(function(m){html+='<button class="pay-btn'+(f.pay===m.id?' on':'')+'" data-pay="'+m.id+'" style="--c:'+m.c+';'+(f.pay===m.id?'background:'+m.bg:'')+' "><div class="pi">'+m.icon+'</div><div class="pl">'+m.id+'</div></button>';});
    html+='</div></div>';
    html+='<div class="form-row"><div class="form-label">誰付款</div><div class="member-btns">';
    [{n:'Wendy',e:'👩',c:'#e76f51',bg:'#fde8e2'},{n:'Stanley',e:'👨',c:'#4361ee',bg:'#e0e7ff'}].forEach(function(m){
      html+='<button class="member-btn'+(f.paidBy===m.n?' on':'')+'" data-paidby="'+m.n+'" style="--mc:'+m.c+';'+(f.paidBy===m.n?'background:'+m.bg:'')+' ">';
      html+='<div>'+m.e+'</div><div style="font-size:12px;font-weight:700;color:'+(f.paidBy===m.n?m.c:'var(--tm)')+'">'+m.n+'</div></button>';
    });
    html+='</div></div>';
    html+='<div class="form-row"><div class="form-label">拆帳人數</div><div class="split-ctrl">';
    html+='<div class="split-num"><button id="splitMinus">−</button><span>'+f.split+'人</span><button id="splitPlus">+</button></div>';
    if(f.split>1&&Number(f.amount)>0) html+='<div style="font-size:12px;color:var(--p);font-weight:600">每人 '+Math.ceil(toTWD(f.amount,f.cur)/f.split).toLocaleString()+' TWD'+(f.cur==='JPY'?' / ¥'+Math.ceil(f.amount/f.split).toLocaleString():'')+' </div>';
    html+='</div></div>';
    html+='<div class="form-grid2"><div><div class="form-label">天數</div><select class="inp" id="expDay">';
    S.days.forEach(function(d,i){html+='<option value="'+(i+1)+'"'+(f.day===i+1?' selected':'')+'>'+DL[i]+(d.city?'・'+d.city:'')+'</option>';});
    html+='</select></div><div><div class="form-label">備註</div><input class="inp" id="expNote" value="'+esc(f.note)+'" placeholder="選填"></div></div>';
    html+='<div class="form-row"><div class="form-label">拍照記帳（可選）</div>';
    html+='<input type="file" id="photoFile" accept="image/*" capture="environment">';
    if(S.pendingPhoto) html+='<div style="position:relative;display:inline-block"><img src="'+S.pendingPhoto+'" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--br)"><button id="clearPhoto" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#dc2626;color:#fff;border:none;cursor:pointer;font-size:12px">×</button></div>';
    else html+='<button class="btn" id="photoBtn" style="background:#fff;color:var(--tm);border:1.5px dashed var(--br);display:flex;align-items:center;gap:6px"><span style="font-size:16px">📷</span> 拍攝收據</button>';
    html+='</div>';
    html+='<div class="form-actions"><button class="btn btn-p" id="addExpBtn" style="flex:1">✓ 確認記帳</button><button class="btn btn-o" id="cancelExpBtn" style="flex:1">取消</button></div></div>';
  }
  if(!S.exps.length) html+='<div style="text-align:center;color:var(--tm);padding:16px;font-size:13px">尚未記錄任何支出</div>';
  var revExps=S.exps.slice().reverse();
  revExps.forEach(function(exp){
    var pm=PAYS.find(function(m){return m.id===exp.pay;})||PAYS[0];
    var amt=toTWD(exp.amount,exp.cur);
    var ph=S.photos[exp.id];
    html+='<div class="exp-row"><div class="exp-inner">';
    if(ph) html+='<img class="exp-photo" src="'+ph+'" data-lightbox="'+ph+'">';
    html+='<div class="exp-body"><div style="display:flex;justify-content:space-between;gap:4px">';
    html+='<span class="exp-name">'+esc(exp.name)+'</span>';
    html+='<div style="text-align:right;flex-shrink:0"><div class="exp-amt">'+amt.toLocaleString()+' <span style="font-size:10px;font-weight:400">TWD</span></div>';
    if(exp.cur==='JPY') html+='<div style="font-size:10px;color:var(--tm)">¥'+Number(exp.amount).toLocaleString()+'</div>';
    html+='</div></div><div class="exp-tags">';
    html+=tag(exp.cat,ECOL[exp.cat],ECOL[exp.cat]+'22');
    html+=tag(pm.icon+' '+pm.id,pm.c,pm.bg);
    var mc={Wendy:'#e76f51',Stanley:'#4361ee'},mbg={Wendy:'#fde8e2',Stanley:'#e0e7ff'};
    html+=tag((exp.paidBy==='Wendy'?'👩':'👨')+' '+exp.paidBy+' 付',mc[exp.paidBy],mbg[exp.paidBy]);
    if(exp.split>1) html+=tag('👥'+exp.split+'人·各'+Math.ceil(amt/exp.split).toLocaleString(),'#7c3aed','#ede9fe');
    html+=tag(DL[exp.day-1],'var(--tm)','#f5f5f5');
    html+='</div>';
    if(exp.note) html+='<div style="font-size:11px;color:var(--tm);margin-top:4px">'+esc(exp.note)+'</div>';
    html+='</div>';
    html+='<button class="icon-btn" data-delexp="'+exp.id+'" style="color:#ccc;font-size:18px">×</button>';
    html+='</div></div>';
  });
  html+='</div>';
  return html;
}

function renderPacking(){
  var ck=S.pack.filter(function(p){return p.done;}).length;
  var html='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  html+='<span style="font-weight:700;color:var(--dk)">打包進度</span>';
  html+='<span style="font-size:13px;font-weight:700;color:var(--p)">'+ck+' / '+S.pack.length+'</span></div>';
  html+=pbar((ck/S.pack.length)*100,'var(--s)');
  if(ck===S.pack.length&&S.pack.length>0) html+='<div style="text-align:center;margin-top:8px;color:var(--p);font-weight:700;font-size:13px">🎉 全部打包完成！出發去北海道～</div>';
  html+='</div>';
  html+='<div class="card" style="display:flex;justify-content:space-between;align-items:center">';
  html+='<span style="font-size:13px;color:var(--tm)">新增自訂物品</span><button class="btn btn-p" id="toggleAddPack">+ 新增</button></div>';
  if(S.showAddPack){
    html+='<div class="card" style="background:var(--vl)"><div class="form-grid2">';
    html+='<div><div class="form-label">物品名稱</div><input class="inp" id="packItem" value="'+esc(S.packForm.item)+'" placeholder="例：鹿仙貝"></div>';
    html+='<div><div class="form-label">類別</div><select class="inp" id="packCat">';
    Object.keys(CICONS).forEach(function(c){html+='<option'+(S.packForm.cat===c?' selected':'')+'>'+c+'</option>';});
    html+='</select></div></div>';
    html+='<div class="form-actions"><button class="btn btn-p" id="addPackBtn" style="flex:1">確認新增</button><button class="btn btn-o" id="cancelPackBtn" style="flex:1">取消</button></div></div>';
  }
  var groups={};
  S.pack.forEach(function(p){groups[p.cat]=groups[p.cat]||[];groups[p.cat].push(p);});
  Object.keys(groups).forEach(function(cat){
    var items=groups[cat];
    var done=items.filter(function(i){return i.done;}).length;
    html+='<div class="card"><div class="sec">'+CICONS[cat]+' '+cat+tag(done+'/'+items.length,'var(--p)','var(--l)')+'</div>';
    items.forEach(function(item){
      html+='<div class="pack-row"><input type="checkbox"'+(item.done?' checked':'')+' data-togpack="'+item.id+'">';
      html+='<span class="pack-label'+(item.done?' done':'')+'">'+esc(item.item)+'</span>';
      html+='<button class="icon-btn" data-delpack="'+item.id+'" style="color:#ccc;font-size:16px">×</button></div>';
    });
    html+='</div>';
  });
  return html;
}

function renderSpotModal(){
  var spot=S.spotModal;
  return '<div class="modal-bg" id="spotModalBg"><div class="modal"><div style="font-weight:700;font-size:15px;margin-bottom:4px">加入哪一天？</div>'+
    '<div style="font-size:13px;color:var(--tm);margin-bottom:14px">「'+esc(spot.name)+'」</div>'+
    '<select class="inp" id="spotDaySelect" style="margin-bottom:16px">'+
    S.days.map(function(d,i){return '<option value="'+i+'"'+(S.spotModalDay===i?' selected':'')+'>'+DL[i]+(d.city?'・'+d.city:'')+'</option>';}).join('')+
    '</select><div style="display:flex;gap:8px"><button class="btn btn-p" id="confirmAddSpot" style="flex:1">確認加入</button><button class="btn btn-o" id="cancelSpotModal" style="flex:1">取消</button></div></div></div>';
}

// ── MAP ──
function loadLeaflet(cb){
  if(window.L){cb();return;}
  var link=document.createElement('link');link.rel='stylesheet';
  link.href='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css';
  document.head.appendChild(link);
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js';
  s.onload=cb;s.onerror=function(){console.warn('Leaflet load failed');};
  document.body.appendChild(s);
}
function initMap(){
  var container=document.getElementById('daymap');
  if(!container) return;
  if(!window.L){loadLeaflet(function(){initMap();});return;}
  container.style.display='block';
  container.style.height='240px';
  container.style.borderRadius='10px';
  container.style.overflow='hidden';
  container.style.marginTop='10px';
  container.style.border='1px solid var(--bl)';
  if(S.mapInst){S.mapInst.remove();S.mapInst=null;}
  var acts=S.days[S.selDay].acts.filter(function(a){return a.coords;});
  if(!acts.length){container.innerHTML='<div style="padding:14px;text-align:center;color:var(--tm);font-size:12px">尚無含座標的行程</div>';return;}
  var map=L.map(container,{zoomControl:true,scrollWheelZoom:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:18}).addTo(map);
  var lls=acts.map(function(act,i){
    var t=AT[act.type]||AT.sight;
    var icon=L.divIcon({html:'<div style="background:'+t.c+';color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.25)">'+(i+1)+'</div>',className:'',iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-14]});
    L.marker(act.coords,{icon}).addTo(map).bindPopup('<b>'+act.time+'</b><br>'+act.name);
    return act.coords;
  });
  if(lls.length>1) L.polyline(lls,{color:'#2d6a4f',weight:2.5,opacity:.65,dashArray:'6,5'}).addTo(map);
  map.fitBounds(L.latLngBounds(lls),{padding:[22,22]});
  S.mapInst=map;
}

// ── EVENTS ──
function bindEvents(){
  var el=function(id){return document.getElementById(id);};

  // Tabs
  document.querySelectorAll('.tab').forEach(function(btn){
    btn.addEventListener('click',function(){S.tab=this.dataset.tab;S.showAdd=false;S.showMap=false;if(S.mapInst){S.mapInst.remove();S.mapInst=null;}render();});
  });

  // Day select
  document.querySelectorAll('[data-selday]').forEach(function(btn){
    btn.addEventListener('click',function(){S.selDay=Number(this.dataset.selday);S.showAdd=false;S.showMap=false;if(S.mapInst){S.mapInst.remove();S.mapInst=null;}render();});
  });

  // City input
  var ci=el('cityInp');
  if(ci) ci.addEventListener('change',function(){S.days[S.selDay].city=this.value;sv('hk_days',S.days);render();});

  // Route
  var rb=el('routeBtn');
  if(rb) rb.addEventListener('click',function(){
    var pts=S.days[S.selDay].acts.filter(function(a){return a.type==='sight'||a.type==='food';});
    if(pts.length) window.open('https://www.google.com/maps/dir/'+pts.map(function(a){return encodeURIComponent(a.name+' '+S.days[S.selDay].city+' Japan');}).join('/'),'_blank');
  });

  // Per-activity maps
  document.querySelectorAll('[data-actmap]').forEach(function(btn){
    btn.addEventListener('click',function(){window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(this.dataset.actmap),'_blank');});
  });

  // Edit/delete activities
  document.querySelectorAll('[data-editact]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=Number(this.dataset.editact);
      var act=S.days[S.selDay].acts.find(function(a){return a.id===id;});
      if(act){S.editActId=id;S.actForm={time:act.time,name:act.name,type:act.type,note:act.note};S.showAdd=true;render();}
    });
  });
  document.querySelectorAll('[data-delact]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=Number(this.dataset.delact);
      S.days[S.selDay].acts=S.days[S.selDay].acts.filter(function(a){return a.id!==id;});
      sv('hk_days',S.days);render();
    });
  });

  // Add act
  var aab=el('addActBtn');
  if(aab) aab.addEventListener('click',function(){S.showAdd=true;S.editActId=null;S.actForm={time:'09:00',name:'',type:'sight',note:''};render();});

  var as=el('actSubmit');
  if(as) as.addEventListener('click',function(){
    var name=el('actName').value.trim();
    if(!name) return;
    var f={time:el('actTime').value,name:name,type:el('actType').value,note:el('actNote').value};
    if(S.editActId){
      S.days[S.selDay].acts=S.days[S.selDay].acts.map(function(a){return a.id===S.editActId?Object.assign({},a,f):a;});
    } else {
      f.id=Date.now();S.days[S.selDay].acts.push(f);
    }
    S.days[S.selDay].acts.sort(function(a,b){return a.time.localeCompare(b.time);});
    sv('hk_days',S.days);S.showAdd=false;S.editActId=null;render();
  });
  var ac=el('actCancel');
  if(ac) ac.addEventListener('click',function(){S.showAdd=false;S.editActId=null;render();});

  // Map toggle
  var tm=el('toggleMap');
  if(tm) tm.addEventListener('click',function(){S.showMap=!S.showMap;if(!S.showMap&&S.mapInst){S.mapInst.remove();S.mapInst=null;}render();if(S.showMap) initMap();});

  // Spots
  var sq=el('spotQ');
  if(sq) sq.addEventListener('input',function(){S.spotQ=this.value;render();});
  document.querySelectorAll('[data-city]').forEach(function(btn){
    btn.addEventListener('click',function(){S.spotCity=this.dataset.city;render();});
  });
  document.querySelectorAll('[data-gmaps]').forEach(function(btn){
    btn.addEventListener('click',function(){window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(this.dataset.gmaps),'_blank');});
  });
  document.querySelectorAll('[data-addspot]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=Number(this.dataset.addspot);
      S.spotModal=SPOTS.find(function(s){return s.id===id;});
      S.spotModalDay=0;render();
    });
  });
  var cs=el('confirmAddSpot');
  if(cs) cs.addEventListener('click',function(){
    if(!S.spotModal) return;
    var day=Number(el('spotDaySelect').value);
    S.days[day].acts.push({id:Date.now(),time:'10:00',name:S.spotModal.name,type:'sight',note:S.spotModal.desc});
    S.days[day].acts.sort(function(a,b){return a.time.localeCompare(b.time);});
    sv('hk_days',S.days);S.added.add(S.spotModal.id);sv('hk_added',[...S.added]);S.spotModal=null;render();
  });
  var csm=el('cancelSpotModal');
  if(csm) csm.addEventListener('click',function(){S.spotModal=null;render();});
  var smb=el('spotModalBg');
  if(smb) smb.addEventListener('click',function(e){if(e.target===this){S.spotModal=null;render();}});

  // Budget
  var bi=el('budgetInp');
  if(bi) bi.addEventListener('change',function(){S.budget=Number(this.value);localStorage.setItem('hk_budget',S.budget);render();});
  var fr=el('fetchRate');
  if(fr) fr.addEventListener('click',function(){
    fetch('https://open.er-api.com/v6/latest/JPY').then(function(r){return r.json();}).then(function(d){
      if(d&&d.rates&&d.rates.TWD){S.rate=parseFloat(d.rates.TWD.toFixed(4));localStorage.setItem('hk_rate',S.rate);render();}
    }).catch(function(){});
  });
  var tr=el('toggleRate');
  if(tr) tr.addEventListener('click',function(){S.showRate=!S.showRate;render();});
  var ri=el('rateInp');
  if(ri) ri.addEventListener('change',function(){S.rate=Number(this.value);localStorage.setItem('hk_rate',S.rate);render();});

  // Expense form
  var tae=el('toggleAddExp');
  if(tae) tae.addEventListener('click',function(){S.showAddExp=!S.showAddExp;render();});
  var ea=el('expName');if(ea) ea.addEventListener('input',function(){S.expForm.name=this.value;});
  var ec=el('expCat');if(ec) ec.addEventListener('change',function(){S.expForm.cat=this.value;});
  var eam=el('expAmt');if(eam) eam.addEventListener('input',function(){S.expForm.amount=this.value;render();});
  var cj=el('curJPY');if(cj) cj.addEventListener('click',function(){S.expForm.cur='JPY';render();});
  var ct=el('curTWD');if(ct) ct.addEventListener('click',function(){S.expForm.cur='TWD';render();});
  document.querySelectorAll('[data-pay]').forEach(function(btn){btn.addEventListener('click',function(){S.expForm.pay=this.dataset.pay;render();});});
  document.querySelectorAll('[data-paidby]').forEach(function(btn){btn.addEventListener('click',function(){S.expForm.paidBy=this.dataset.paidby;render();});});
  var sm=el('splitMinus');if(sm) sm.addEventListener('click',function(){S.expForm.split=Math.max(1,S.expForm.split-1);render();});
  var sp=el('splitPlus');if(sp) sp.addEventListener('click',function(){S.expForm.split=Math.min(10,S.expForm.split+1);render();});
  var ed=el('expDay');if(ed) ed.addEventListener('change',function(){S.expForm.day=Number(this.value);});
  var en=el('expNote');if(en) en.addEventListener('input',function(){S.expForm.note=this.value;});
  var pb=el('photoBtn');if(pb) pb.addEventListener('click',function(){el('photoFile').click();});
  var pf=el('photoFile');
  if(pf) pf.addEventListener('change',function(){
    var file=this.files[0];if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var MAX=480,w=img.width,h=img.height;
        if(w>h){if(w>MAX){h=Math.round(h*(MAX/w));w=MAX;}}else{if(h>MAX){w=Math.round(w*(MAX/h));h=MAX;}}
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        S.pendingPhoto=c.toDataURL('image/jpeg',.65);render();
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  var cp=el('clearPhoto');if(cp) cp.addEventListener('click',function(){S.pendingPhoto=null;render();});
  var aeb=el('addExpBtn');
  if(aeb) aeb.addEventListener('click',function(){
    var name=el('expName').value.trim(),amt=el('expAmt').value;
    if(!name||!amt) return;
    var f=S.expForm;
    var exp={id:Date.now(),name:name,amount:amt,cur:f.cur,cat:f.cat,day:Number(el('expDay').value),pay:f.pay,split:f.split,paidBy:f.paidBy,note:el('expNote').value||''};
    S.exps.push(exp);sv('hk_exp',S.exps);
    if(S.pendingPhoto){S.photos[exp.id]=S.pendingPhoto;S.pendingPhoto=null;}
    S.expForm={name:'',amount:'',cur:'JPY',cat:'食',day:1,pay:'現金',split:1,paidBy:'Wendy',note:''};
    S.showAddExp=false;render();
  });
  var ceb=el('cancelExpBtn');if(ceb) ceb.addEventListener('click',function(){S.showAddExp=false;render();});
  document.querySelectorAll('[data-delexp]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=Number(this.dataset.delexp);
      S.exps=S.exps.filter(function(e){return e.id!==id;});sv('hk_exp',S.exps);
      delete S.photos[id];render();
    });
  });

  // Photo lightbox
  document.querySelectorAll('[data-lightbox]').forEach(function(img){
    img.addEventListener('click',function(){S.viewPhoto=this.dataset.lightbox;render();});
  });
  var lb=el('lightbox');
  if(lb) lb.addEventListener('click',function(){S.viewPhoto=null;render();});

  // Packing
  var tap=el('toggleAddPack');if(tap) tap.addEventListener('click',function(){S.showAddPack=!S.showAddPack;render();});
  document.querySelectorAll('[data-togpack]').forEach(function(cb){
    cb.addEventListener('change',function(){
      var id=Number(this.dataset.togpack);
      S.pack=S.pack.map(function(p){return p.id===id?Object.assign({},p,{done:!p.done}):p;});
      sv('hk_pack',S.pack);render();
    });
  });
  document.querySelectorAll('[data-delpack]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=Number(this.dataset.delpack);S.pack=S.pack.filter(function(p){return p.id!==id;});sv('hk_pack',S.pack);render();
    });
  });
  var apb=el('addPackBtn');
  if(apb) apb.addEventListener('click',function(){
    var item=el('packItem').value.trim();if(!item) return;
    S.pack.push({id:Date.now(),cat:el('packCat').value,item:item,done:false});
    sv('hk_pack',S.pack);S.showAddPack=false;S.packForm={item:'',cat:'其他'};render();
  });
  var cpb=el('cancelPackBtn');if(cpb) cpb.addEventListener('click',function(){S.showAddPack=false;render();});
  var rb=el('resetBtn');
  if(rb) rb.addEventListener('click',function(){
    if(!confirm('確定要重置所有行程回預設值嗎？（已記錄的支出和打包清單不會被清除）')) return;
    S.days=DEFAULT_DAYS.map(function(d){return{city:d.city,acts:d.acts.slice()};});
    S.added=new Set();
    sv('hk_days',S.days);sv('hk_added',[]);
    S.selDay=0;render();
  });
}

// ── BOOT ──
// Run immediately - no waiting
(function(){
  try { render(); } catch(e) { console.error('Render error:', e); }
  function removeSplash(){
    var s=document.getElementById('splash');
    if(s){s.classList.add('out');setTimeout(function(){if(s&&s.parentNode)s.parentNode.removeChild(s);},450);}
  }
  removeSplash();
  // Guaranteed fallback
  setTimeout(removeSplash, 800);
})();
</script>
